<!DOCTYPE html>
<html>
<head>
<title>Login - DesignMate</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.login-box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}
input {
  padding: 10px;
  margin: 10px;
  width: 200px;
}
button {
  padding: 10px 20px;
  background: #ff4d4d;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="login-box">
<h2>DesignMate Login</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="loginUser()">Login</button>
</div>

<script>
function loginUser() {
  var user = document.getElementById("username").value;
  var pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid Login");
  }
}
</script>

</body>
</html>
